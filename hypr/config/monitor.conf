# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                     Monitor Configuration                   ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

# Monitor wiki https://wiki.hyprland.org/0.45.0/Configuring/Monitors/


# Left monitor (1080p @ 60Hz)
monitor = HDMI-A-1, 1920x1080@60, 0x0, 1

# Middle monitor (1440p @ 144Hz - highest available)
monitor = DP-1, 2560x1440@144, 1920x0, 1

# Right monitor (1080p @ 60Hz)
monitor = DP-2, 1920x1080@60, 4480x0, 1

# Workspace rules - bind all workspaces only to main monitor (DP-1)
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:DP-1
workspace = name:A, monitor:DP-1
workspace = name:B, monitor:DP-1
workspace = name:C, monitor:DP-1
workspace = name:D, monitor:DP-1
workspace = name:E, monitor:DP-1
workspace = name:F, monitor:DP-1
workspace = name:G, monitor:DP-1
workspace = name:H, monitor:DP-1
workspace = name:I, monitor:DP-1
workspace = name:J, monitor:DP-1
workspace = name:K, monitor:DP-1
workspace = name:L, monitor:DP-1
workspace = name:M, monitor:DP-1
workspace = name:N, monitor:DP-1
workspace = name:O, monitor:DP-1
workspace = name:P, monitor:DP-1
workspace = name:Q, monitor:DP-1
workspace = name:R, monitor:DP-1
workspace = name:S, monitor:DP-1
workspace = name:T, monitor:DP-1
workspace = name:U, monitor:DP-1
workspace = name:V, monitor:DP-1
workspace = name:W, monitor:DP-1
workspace = name:X, monitor:DP-1
workspace = name:Y, monitor:DP-1
workspace = name:Z, monitor:DP-1

# Disable workspaces on side monitors
workspace = name:empty, monitor:HDMI-A-1
workspace = name:empty, monitor:DP-2

# If you need to scale things like steam etc, please uncomment these lines.
# Adjust GDK_SCALE accordingly to your liking.
#xwayland {
#  force_zero_scaling = true       # Unscale XWayland
#}

#env = GDK_SCALE, 1.25             # GDK Scaling Factor
