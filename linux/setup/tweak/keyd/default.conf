# /etc/keyd/default.conf — Mac-style Cmd behaviour on Linux
# Physical Cmd key (Super) → acts as Ctrl for everything (copy, paste, Cmd+Space, etc.)
# Tap alone → still sends Super (no Hyprland bindings use it after the refactor)

[ids]
*

[main]
leftmeta  = overload(mac, leftmeta)
rightmeta = overload(mac, leftmeta)

# Type :C means every key pressed while Cmd is held outputs Ctrl+key by default.
# Only the special-case remaps below override that.
[mac:C]

# Cmd+Tab → Alt+Tab (Hyprland's cyclenext binding handles it)
tab = A-tab

# Cmd+Space stays as Super+Space (NOT Ctrl+Space) so Hyprland can bind
# Cmd+Space and Ctrl+Space to different actions (launcher vs filemanager).
# Add more keys here if you need Cmd vs Ctrl to behave differently.
space = M-space

# Mac-style line / document navigation
left  = home
right = end
up    = C-home
down  = C-end

# Physical Ctrl+V → Super+V so Hyprland can bind it to the clipboard manager
# without breaking paste (Cmd+V still outputs Ctrl+V via the mac:C default above).
[control]
v = M-v
