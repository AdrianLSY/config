# ┃                         Keybinds                            ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

source = ~/.config/hypr/config/defaults.conf

# https://wiki.hyprland.org/Configuring/Binds/
bindd = CTRL, Q, Closes (not kill) current window, killactive,
bindd = CTRL SHIFT, 4, Screen capture selection, exec, $screenshot-selection
bindd = CTRL SHIFT, 3, Screen capture full screen, exec, $screenshot-fullscreen
bindd = SUPER, SPACE, Runs your application launcher (Cmd+Space), exec, $applauncher
bindd = CTRL, SPACE, Opens your preferred file manager, exec, $filemanager
bindd = SUPER, V, Opens clipboard manager (Ctrl+V), exec, $clipboard
bindd = $mainMod, SPACE, Opens your preferred terminal emulator, exec, $terminal

# Cmd+Tab → Alt+Tab → cycle windows
bind = $mainMod, Tab, cyclenext
bind = $mainMod SHIFT, Tab, cyclenext, prev

# ======= Desktop Settings =======

bindd = ALT, F1, Reload/restarts Waybar, exec, killall -SIGUSR2 waybar
bindd = $mainMod, Escape, Show power menu, exec, $powermenu

# ======= Window Actions =======

# Resize/move window with mainMod+SHIFT + LMB/RMB and dragging
bindm = $mainMod SHIFT, mouse:273, resizewindow	#Resize the window towards a direction
bindm = $mainMod SHIFT, mouse:272, movewindow		#Drag window
## Resizing Windows End #

## Move active window to a workspace with $mainMod + CTRL
